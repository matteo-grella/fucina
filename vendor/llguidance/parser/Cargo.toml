# Vendored from guidance-ai/llguidance (see ../README.md for the exact
# upstream commit and the list of deviations from the upstream manifest).

[package]
name = "llguidance"
version = "1.7.6"
edition = "2021"
license = "MIT"
description = "Super-fast Structured Outputs"
repository = "https://github.com/guidance-ai/llguidance"
rust-version.workspace = true

[dependencies]
toktrie = { path = "../toktrie" }
derivre = { version = "=0.3.12", default-features = false, features = ["compress"] }
serde = { version = "1.0.217", features = ["derive"] }
serde_json = { version = "1.0.138", features = ["preserve_order"] }
anyhow = "1.0.95"
regex-syntax = "0.8.5"
indexmap = "2.7.1"

referencing = { version = "0.29.0", optional = true }

[lib]
crate-type = ["staticlib", "rlib"]

# The sources gate on features this manifest drops (rayon,
# jsonschema_validation, wasm); silence rustc's check-cfg warnings for them.
[lints.rust]
unexpected_cfgs = "allow"

[features]
default = ["lark", "referencing"]
logging = []                      # this is extensive debug logging
lark = []                         # ~115k (binary)
referencing = ["dep:referencing"]
ahash = ["derivre/ahash"]
